name: flutter_tip_calculator
description: A modern tip and bill splitting calculator.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # Added dependencies for production readiness
  shared_preferences: ^2.2.2 # For persistent history storage
  intl: ^0.18.1 # For locale-aware number and date formatting
  share_plus: ^12.0.2 # For sharing calculation history

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0